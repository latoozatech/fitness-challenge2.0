<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8-Week Fitness Challenge</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire: #FF4C1F; --gold: #F5A623; --dark: #111111;
            --card: #1A1A1A; --border: #2A2A2A; --text: #F0EDE8;
            --muted: #888; --beg: #4CAF7D; --int: #F5A623; --adv: #FF4C1F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 40px 20px 60px; }
        
        /* Header & Progress */
        .page-header { text-align: center; margin-bottom: 18px; }
        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 96px);
            background: linear-gradient(135deg, #fff 30%, var(--fire));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .progress-container { max-width: 1200px; margin: 0 auto 20px; text-align: right; font-size: 14px; color: var(--muted); }

        /* Toolbar - Hidden by default */
        .toolbar {
            max-width: 1200px; margin: 18px auto 34px; padding: 14px;
            border: 1px solid var(--border); border-radius: 14px;
            background: #141414; display: none; flex-wrap: wrap;
            gap: 10px; justify-content: space-between; align-items: center;
        }
        .toolbar.admin-visible { display: flex; }

        .btn {
            border: 1px solid var(--border); background: #1b1b1b; color: var(--text);
            padding: 10px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer;
        }
        .toggle { display: inline-flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: #1b1b1b; cursor: pointer; }
        .switch { width: 42px; height: 22px; border-radius: 999px; background: #2a2a2a; position: relative; }
        .knob { width: 18px; height: 18px; border-radius: 50%; background: #888; position: absolute; top: 2px; left: 2px; transition: .2s; }
        .toggle.on .knob { left: 20px; background: var(--beg); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
        .week-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s; }
        .week-header { padding: 18px 22px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        .week-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 1px; }

        .ex-row { display: grid; grid-template-columns: 35px 1fr 55px 55px 55px; align-items: center; padding: 12px 22px; border-bottom: 1px solid #1f1f1f; gap: 8px; }
        .ex-row.done { opacity: 0.35; background: rgba(0,0,0,0.2); }
        .ex-row.done .ex-name { text-decoration: line-through; }
        .ex-row.clickable { cursor: pointer; }
        .ex-row.clickable:hover { background: rgba(255,255,255,0.03); }

        .complete-check { width: 20px; height: 20px; cursor: pointer; accent-color: var(--beg); }
        .ex-name { font-size: 13px; font-weight: 500; }
        .ex-name small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; text-decoration: none !important; }
        
        .pill { font-size: 10px; font-weight: 700; text-align: center; padding: 4px; border-radius: 6px; }
        .pill.beg { background: rgba(76,175,125,0.15); color: var(--beg); }
        .pill.int { background: rgba(245,166,35,0.15); color: var(--int); }
        .pill.adv { background: rgba(255,76,31,0.18); color: var(--adv); }

        .col-header { display: grid; grid-template-columns: 35px 1fr 55px 55px 55px; padding: 8px 22px; background: #161616; font-size: 9px; color: var(--muted); font-weight: 800; text-transform: uppercase; }

        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .ex-row, .col-header { grid-template-columns: 30px 1fr 45px 45px 45px; padding: 12px 10px; }
            .week-title { font-size: 18px; }
        }

        .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 10px; opacity: 0; pointer-events: none; transition: .3s; z-index: 100; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>8-Week Challenge</h1>
        <p style="color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-size: 12px;">Track Your Progress · Level Up</p>
    </div>

    <div class="progress-container">
        Overall Progress: <span id="progressText">0%</span>
        <button class="btn" style="margin-left: 15px; padding: 5px 10px;" onclick="resetProgress()">Reset All</button>
    </div>

    <!-- Admin Toolbar: Only visible if ?admin=true -->
    <div id="adminToolbar" class="toolbar">
        <div id="editToggle" class="toggle">
            <div class="switch"><div class="knob"></div></div>
            <span>Edit Mode</span>
        </div>
        <div class="toolbar-right">
            <button class="btn" id="shareBtn" style="background: var(--fire); border: none;">Copy Share Link</button>
        </div>
    </div>

    <div class="grid" id="challengeGrid"></div>
    <div class="toast" id="toast"></div>

<script>
    const weeks = [
        { num: 1, theme: "Foundation & Movement", exercises: [
            { name: "Jumping Jacks", note: "or Step Jacks", beg: "80", int: "150", adv: "200", link: "https://musclewiki.com/exercise/cardio-jumping-jacks?model=f" }, 
            { name: "Bodyweight Squats", note: "", beg: "30", int: "60", adv: "100", link: "https://musclewiki.com/exercise/bodyweight-squat?model=f" },
            { name: "Push-Ups", note: "or Knee Push-Ups", beg: "20", int: "45", adv: "75", link: "https://musclewiki.com/exercise/push-up?model=f" },
            { name: "Glute Bridges", note: "", beg: "30", int: "60", adv: "100", link: "https://musclewiki.com/exercise/bodyweight-feet-elevated-glute-bridge?model=f" },
            { name: "Plank Hold", note: "", beg: "40s", int: "75s", adv: "120s", link: "https://musclewiki.com/exercise/forearm-plank?model=f" },
        ]},
        { num: 2, theme: "Core & Cardio", exercises: [
            { name: "High Knees", note: "each leg", beg: "50", int: "100", adv: "160", link: "https://musclewiki.com/exercise/cardio-knee-taps?model=f" },
            { name: "Sit-Ups", note: "or Crunches x 2 Reps", beg: "20", int: "30", adv: "50", link: "https://musclewiki.com/exercise/bodyweight-situp?model=f" },
            { name: "Core Combo", note: "1m Climbers - 30s Planks - 30s Knees to elbows", beg: "3", int: "5", adv: "10", link:"" },
            { name: "Side Plank", note: "each side", beg: "30s", int: "50s", adv: "80s", link: "https://musclewiki.com/exercise/hand-side-plank?model=f" },
            { name: "In & Out Squats", note: "1 in & 1 Out = 1 Rep", beg: "20", int: "40", adv: "70", link: "https://musclewiki.com/exercise/in-and-out-jump-squat?model=f" },
        ]},
        { num: 3, theme: "Lower Body Focus", exercises: [
            { name: "Side Lunges", note: "each leg", beg: "20", int: "40", adv: "65", link: "https://musclewiki.com/exercise/side-lunges?model=f" },
            { name: "Wall Sit", note: "", beg: "45s", int: "90s", adv: "150s", link: "https://musclewiki.com/exercise/wall-sit?model=f" },
            { name: "Calf Raises", note: "slow & controlled", beg: "60", int: "100", adv: "160", link: "https://musclewiki.com/exercise/calf-raises?model=f?model=f" },
            { name: "Glutes 3 in 1", note: "each movement - each side", beg: "10", int: "20", adv: "30", link: "https://www.instagram.com/reel/DXErQmyDGvo/?igsh=MTRrZmgyYjhrNmhhZA%3D%3D" },
            { name: "Step-Ups", note: "use a chair/bench - Weights or not", beg: "20", int: "40", adv: "70", link: "https://musclewiki.com/exercise/kettlebell-step-up?model=f" },
        ]},
        { num: 4, theme: "Upper Body & Stability", exercises: [
            { name: "Push-Up Hold", note: "at lowest point", beg: "30s", int: "60s", adv: "90s" },
            { name: "Triceps Dips", note: "chair, bench or Machine", beg: "25", int: "50", adv: "80", link: "https://musclewiki.com/exercise/bench-dips?model=f?model=f" },
            { name: "Incline Push-Ups", note: "Or decline", beg: "20", int: "40", adv: "65", link: "https://musclewiki.com/exercise/incline-push-up?model=f?model=f" },
            { name: "Shoulder Taps", note: "in plank", beg: "30", int: "60", adv: "100" },
            { name: "Dead Bug", note: "slow & controlled", beg: "20", int: "40", adv: "65" },
        ]},
        { num: 5, theme: "Conditioning & Endurance", exercises: [
            { name: "Burpees", note: "no push-up for beg.", beg: "15", int: "30", adv: "55" },
            { name: "Jump Rope", note: "or imaginary", beg: "2min", int: "4min", adv: "6min" },
            { name: "Bear Crawl", note: "fwd + back = 1", beg: "45s", int: "75s", adv: "120s" },
            { name: "Squat Pulses", note: "", beg: "40", int: "70", adv: "110" },
            { name: "Hollow Hold", note: "or Tuck Hold", beg: "30s", int: "60s", adv: "100s" },
        ]},
        { num: 6, theme: "Core Control", exercises: [
            { name: "Russian Twists", note: "add weight if able", beg: "40", int: "80", adv: "130" },
            { name: "Leg Raises", note: "lying flat", beg: "20", int: "45", adv: "75" },
            { name: "Plank Up-Downs", note: "elbow to hand", beg: "15", int: "30", adv: "50" },
            { name: "Superman Hold", note: "", beg: "45s", int: "75s", adv: "120s" },
            { name: "Plank Shoulder Tap to Pushups", note: "or not Pushups", beg: "45s", int: "120s", adv: "180s" },
        ]},
        { num: 7, theme: "Power & Athleticism", exercises: [
            { name: "Squat Jumps", note: "full depth", beg: "30", int: "55", adv: "90" },
            { name: "Lateral Skaters", note: "each side", beg: "30", int: "55", adv: "90" },
            { name: "Push-Up Rotation", note: "T-Rotation", beg: "10", int: "24", adv: "40" },
            { name: "High-Knee Sprint", note: "in place", beg: "90s", int: "2.5m", adv: "4m" },
            { name: "Plank Walkouts", note: "standing to plank", beg: "15", int: "30", adv: "50" },
        ]},
        { num: 8, theme: "Final Challenge Week", final: true, exercises: [
            { name: "Squats — Max Reps", note: "bodyweight", beg: "100", int: "200", adv: "300" },
            { name: "Push-Up Challenge", note: "any variation", beg: "60", int: "120", adv: "175" },
            { name: "Core Finisher", note: "3 of choice", beg: "6min", int: "10min", adv: "14min" },
            { name: "Burpee Test", note: "record count", beg: "25", int: "55", adv: "85" },
            { name: "Wildcard", note: "your hardest move", beg: "5pts", int: "10pts", adv: "15pts" },
        ]}
    ];

    let editMode = false;
    const STORAGE_LINKS = "exerciseLinks_v1";
    const STORAGE_DONE = "exerciseProgress_v1";

    // CHECK FOR ADMIN MODE IN URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
        document.getElementById('adminToolbar').classList.add('admin-visible');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function getKey(w, i) { return `w${w}e${i}`; }

    function toggleDone(key) {
        const done = JSON.parse(localStorage.getItem(STORAGE_DONE) || "{}");
        done[key] = !done[key];
        localStorage.setItem(STORAGE_DONE, JSON.stringify(done));
        render();
    }

    function resetProgress() {
        if(confirm("This will clear all your checkmarks. Ready for a fresh start?")) {
            localStorage.removeItem(STORAGE_DONE);
            render();
            showToast("Progress Reset");
        }
    }

    function render() {
    const grid = document.getElementById('challengeGrid');
    const localLinks = JSON.parse(localStorage.getItem(STORAGE_LINKS) || "{}"); // Saved in browser
    const done = JSON.parse(localStorage.getItem(STORAGE_DONE) || "{}");
    grid.innerHTML = "";

    weeks.forEach(week => {
        const card = document.createElement('div');
        card.className = 'week-card';
        
        const rowsHtml = week.exercises.map((ex, idx) => {
            const key = getKey(week.num, idx);
            
            // FIXED: Look for hardcoded "ex.link" if local storage is empty
            const link = localLinks[key] || ex.link || ""; 
            
            const isDone = !!done[key];

            return `
            <div class="ex-row ${isDone ? 'done' : ''} ${(!editMode && link) ? 'clickable' : ''}" 
                 onclick="if(!editMode && '${link}') window.open('${link}', '_blank')">
                <input type="checkbox" class="complete-check" ${isDone ? 'checked' : ''} 
                       onclick="event.stopPropagation(); toggleDone('${key}')">
                <div class="ex-name">
                    ${link ? `<span style="border-bottom:1px dashed #666; color:var(--fire)">${ex.name}</span>` : `<span>${ex.name}</span>`}
                    <small>${ex.note}</small>
                    ${editMode ? `<input class="link-input" style="width:100%; margin-top:5px; background:#000; color:#fff; border:1px solid #444; padding:4px;" placeholder="Paste demo link..." value="${link}" oninput="saveLink('${key}', this.value)" onclick="event.stopPropagation()">` : ''}
                </div>
                <div class="pill beg">${ex.beg}</div>
                <div class="pill int">${ex.int}</div>
                <div class="pill adv">${ex.adv}</div>
            </div>`;
        }).join('');

        card.innerHTML = `
            <div class="week-header"><div class="week-title">WEEK ${week.num}: ${week.theme}</div></div>
            <div class="col-header"><span></span><span>Exercise</span><span>BEG</span><span>INT</span><span>ADV</span></div>
            <div class="exercises">${rowsHtml}</div>`;
        grid.appendChild(card);
    });

    }

    function saveLink(key, val) {
        const links = JSON.parse(localStorage.getItem(STORAGE_LINKS) || "{}");
        links[key] = val;
        localStorage.setItem(STORAGE_LINKS, JSON.stringify(links));
    }

    document.getElementById('editToggle').onclick = function() {
        editMode = !editMode;
        this.classList.toggle('on');
        render();
    };

    document.getElementById('shareBtn').onclick = function() {
        const links = localStorage.getItem(STORAGE_LINKS) || "{}";
        const b64 = btoa(links);
        // Create link that includes the data in the hash
        const url = `${window.location.origin}${window.location.pathname}#links=${b64}`;
        navigator.clipboard.writeText(url).then(() => showToast("Share Link Copied!"));
    };

    // Load links from URL if present
    const hash = window.location.hash;
    if (hash.includes('links=')) {
        try {
            const b64 = hash.split('links=');
            const importedLinks = JSON.parse(atob(b64));
            const existingLinks = JSON.parse(localStorage.getItem(STORAGE_LINKS) || "{}");
            localStorage.setItem(STORAGE_LINKS, JSON.stringify({...existingLinks, ...importedLinks}));
            window.location.hash = ""; // Clean URL
            showToast("Links Loaded!");
        } catch(e) { console.error("Link import failed"); }
    }

    render();
</script>
</body>
</html>
