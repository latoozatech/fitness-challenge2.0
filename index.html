<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8-Week Fitness Challenge</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-header">
    <h1>8-Week Challenge Minis</h1>
    <p>Form over Level · Level Up · Focus · Don't Cheat · Push Yourself</p>
  </div>

  <div class="progress-container">
    Overall Progress: <span id="progressText">0%</span>
    <button class="btn" id="resetBtn">Reset All</button>
  </div>

  <!-- Admin Toolbar: Only visible if ?admin=true -->
  <div id="adminToolbar" class="toolbar">
    <div id="editToggle" class="toggle">
      <div class="switch">
        <div class="knob"></div>
      </div>
      <span>Edit Mode</span>
    </div>
    <div class="toolbar-right">
      <button class="btn" id="shareBtn">Copy Share Link</button>
    </div>
  </div>

  <div class="grid" id="challengeGrid"></div>
  <div class="toast" id="toast"></div>

  <footer class="page-footer-bottom">
    <p>&copy; 2026 Latoozatech by <strong>Jonatan Rojas</strong> (The Coach)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
